services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "${WEBAPP_PORT:-8080}"
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${WEBAPP_PORT:-8080}/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      webapp:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-6000}:${GATEWAY_PORT:-6000}"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${GATEWAY_PORT:-6000}/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  optional-lint:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm ci && npm run lint"
    volumes:
      - ./:/workspace
    profiles:
      - optional-checks
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
