server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite assets and static files
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA files should always be revalidated
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    location = /manifest.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /registerSW.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Keep second entrypoint reachable as a real page.
    location = /database.html {
        try_files $uri =404;
    }

    # SPA fallback for all other routes in the main app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
